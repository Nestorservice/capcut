<!-- Navigation Bar Logic (Suppressed as per "Task-Focused" rule) -->
<script>
        function switchTab(tab) {
            const tabs = ['filter', 'adjust', 'vignette'];
            tabs.forEach(t => {
                const btn = document.getElementById(`tab-${t}`);
                const indicator = document.getElementById(`indicator-${t}`);
                const view = document.getElementById(`view-${t}`);
                
                if (t === tab) {
                    btn.classList.add('text-on-surface', 'font-bold');
                    btn.classList.remove('text-on-surface-variant', 'font-medium');
                    indicator.classList.remove('opacity-0');
                    if(view) view.classList.remove('hidden');
                } else {
                    btn.classList.remove('text-on-surface', 'font-bold');
                    btn.classList.add('text-on-surface-variant', 'font-medium');
                    indicator.classList.add('opacity-0');
                    if(view) view.classList.add('hidden');
                }
            });
        }

        // Initialize micro-interaction on filter items
        document.querySelectorAll('#view-filter .flex-shrink-0').forEach(item => {
            item.addEventListener('touchstart', () => {
                item.style.transform = 'scale(0.95)';
                item.style.transition = 'transform 0.1s ease';
            });
            item.addEventListener('touchend', () => {
                item.style.transform = 'scale(1)';
            });
        });
    </script>
