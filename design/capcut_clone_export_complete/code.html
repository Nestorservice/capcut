<body class="font-body-md text-body-md overflow-hidden">
<!-- Top Navigation Anchor (Manual mapping from Shared Component JSON) -->
<header class="fixed top-0 w-full flex justify-between items-center px-container-padding h-touch-target-min z-50 bg-background border-b border-outline-variant">
<div class="flex items-center gap-2 active:scale-95 transition-transform hover:opacity-80">
<span class="material-symbols-outlined text-primary" data-icon="close">close</span>
</div>
<h1 class="font-display text-display text-primary uppercase tracking-tighter text-[18px]">KINETIC NOIR</h1>
<button class="text-primary font-label-md text-label-md hover:opacity-80 active:scale-95 transition-transform">
            EXPORT
        </button>
</header>
<main class="relative min-h-screen w-full flex flex-col pt-16 pb-8 px-container-padding">
<!-- Atmospheric Background Glows -->
<div class="absolute top-1/4 left-1/2 -translate-x-1/2 w-64 h-64 gradient-glow rounded-full"></div>
<!-- Success Identity Section -->
<div class="mt-8 flex flex-col items-center text-center animate-in fade-in slide-in-from-bottom-4 duration-700">
<div class="relative mb-4">
<div class="absolute inset-0 bg-primary-container blur-2xl opacity-20 scale-150 rounded-full"></div>
<span class="material-symbols-outlined text-[80px] text-primary" data-icon="check_circle" data-weight="fill" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<h2 class="font-headline-lg text-headline-lg text-white mb-2">Export complete!</h2>
<p class="font-body-md text-on-surface-variant max-w-[280px]">Your masterpiece is ready for the world. Cinematic 4K render successful.</p>
</div>
<!-- Video Preview Card -->
<div class="mt-8 relative group animate-in fade-in slide-in-from-bottom-6 duration-1000 delay-150">
<div class="absolute -inset-0.5 bg-gradient-to-r from-[#FF4081] to-[#9C27B0] rounded-xl blur opacity-20 group-hover:opacity-40 transition duration-500"></div>
<div class="relative aspect-video rounded-xl overflow-hidden bg-surface-container border border-outline-variant">

<div class="absolute inset-0 bg-black/20 flex items-center justify-center">
<div class="w-12 h-12 rounded-full bg-white/10 backdrop-blur-md border border-white/20 flex items-center justify-center">
<span class="material-symbols-outlined text-white" data-icon="play_arrow" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
</div>
</div>
</div>
</div>
<!-- Action Grid -->
<div class="mt-10 grid grid-cols-2 gap-4 animate-in fade-in slide-in-from-bottom-8 duration-1000 delay-300">
<!-- Share -->
<button class="flex flex-col items-center justify-center py-6 px-4 rounded-xl glass-panel text-on-surface-variant hover:text-primary active:scale-95 transition-all">
<span class="material-symbols-outlined mb-2 text-[28px]" data-icon="share">share</span>
<span class="font-label-md text-label-md">Share</span>
</button>
<!-- Save to gallery -->
<button class="flex flex-col items-center justify-center py-6 px-4 rounded-xl glass-panel text-on-surface-variant hover:text-primary active:scale-95 transition-all">
<span class="material-symbols-outlined mb-2 text-[28px]" data-icon="download">download</span>
<span class="font-label-md text-label-md text-center">Save to gallery</span>
</button>
<!-- WhatsApp -->
<button class="flex flex-col items-center justify-center py-6 px-4 rounded-xl glass-panel text-on-surface-variant hover:text-primary active:scale-95 transition-all">
<span class="material-symbols-outlined mb-2 text-[28px]" data-icon="chat">chat</span>
<span class="font-label-md text-label-md">WhatsApp</span>
</button>
<!-- Copy link -->
<button class="flex flex-col items-center justify-center py-6 px-4 rounded-xl glass-panel text-on-surface-variant hover:text-primary active:scale-95 transition-all">
<span class="material-symbols-outlined mb-2 text-[28px]" data-icon="link">link</span>
<span class="font-label-md text-label-md">Copy link</span>
</button>
</div>
<!-- Footer Action -->
<div class="mt-auto pt-8 flex justify-center animate-in fade-in slide-in-from-bottom-10 duration-1000 delay-500">
<button class="w-full py-4 border border-outline rounded-full font-label-md text-label-md text-white hover:bg-white/5 active:scale-95 transition-all uppercase tracking-widest">
                Edit more
            </button>
</div>
</main>
<!-- Bottom Navigation Shell (Suppressed as per "Task-Focused" exclusion rule, but structure maintained for visual consistency if user navigates back) -->
<!-- Navigation hidden to prioritize the Success journey canvas as requested in UX guidelines -->
<script>
        // Simple entry animation trigger
        document.addEventListener('DOMContentLoaded', () => {
            const elements = document.querySelectorAll('.animate-in');
            elements.forEach((el, index) => {
                el.style.opacity = '0';
                setTimeout(() => {
                    el.style.opacity = '1';
                }, 100 * index);
            });
        });
    </script>
