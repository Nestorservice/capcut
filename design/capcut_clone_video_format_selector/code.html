<style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }

    .custom-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .glass-effect {
      background: rgba(13, 13, 13, 0.95);
      backdrop-filter: blur(12px);
    }
    .video-mask {
      aspect-ratio: 9/16;
      border: 1px dashed rgba(255, 255, 255, 0.3);
    }
  </style>

<body class="bg-black text-on-surface font-body-md selection:bg-primary-container selection:text-white overflow-hidden">
<!-- Top Bar (Shared Component Strategy) -->
<header class="fixed top-0 left-0 right-0 z-50 flex justify-between items-center w-full px-container-padding h-14 bg-black border-b border-outline-variant/30">
<button class="active:scale-95 transition-transform duration-100 hover:opacity-80 flex items-center justify-center">
<span class="material-symbols-outlined text-on-surface" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md text-white">Aspect Ratio</h1>
<button class="active:scale-95 transition-transform duration-100 hover:opacity-80 flex items-center justify-center">
<span class="material-symbols-outlined text-primary-container" data-icon="done">done</span>
</button>
</header>
<main class="flex flex-col h-screen pt-14">
<!-- Preview Zone (Top 50%) -->
<section class="flex-1 flex flex-col items-center justify-center relative bg-black p-8">
<div class="relative w-full h-full flex items-center justify-center">
<!-- Crop Boundaries Visualization -->
<div class="video-mask h-full max-h-[400px] relative overflow-hidden bg-surface-container-lowest">
<img alt="Cinematic video preview" class="absolute inset-0 w-full h-full object-cover opacity-60" src="https://lh3.googleusercontent.com/aida/ADBb0uivB-0G8a6NWc_bZf9db3WQiLXzEHBnqAqNKAP5fzC-p4JsGChgG699hMfpHbjfVRkcmVD-ntdGFyx4Ka6fnHL_rNRdpGdwRg3vIpa6mSNOUMsn8mggO-QhSDHFFfdLBNQKiCyY5INyigWmysb8kRcfF-suTDhGTF2VoJdde7EXLGZ3azLQi0UE-1KssiMvJIBVW7B3UMwzh2QPgc9HzwqVvcerue_dlBRSsTL_AITFNfbo13iJos7Ilpw"/>
<div class="absolute inset-0 border-[0.5px] border-white/20"></div>
<!-- Playhead center indicator -->
<div class="absolute left-1/2 top-0 bottom-0 w-px bg-white/10"></div>
<div class="absolute top-1/2 left-0 right-0 h-px bg-white/10"></div>
</div>
</div>
<div class="mt-4">
<span class="font-label-md text-label-md text-white tracking-widest bg-white/10 px-3 py-1 rounded-full">9:16</span>
</div>
</section>
<!-- Format Panel (Bottom 50%) -->
<section class="h-1/2 glass-effect rounded-t-[20px] p-container-padding overflow-y-auto custom-scrollbar border-t border-outline-variant/20 shadow-2xl">
<!-- Aspect Ratio Section -->
<div class="mb-6">
<h2 class="font-headline-md text-headline-md text-white mb-4">Aspect ratio</h2>
<div class="flex gap-3 overflow-x-auto custom-scrollbar pb-2">
<!-- Ratio Items -->
<div class="flex flex-col items-center gap-2 min-w-[72px] cursor-pointer group">
<div class="w-14 h-14 rounded-lg bg-surface-variant/30 flex items-center justify-center border border-outline-variant group-hover:border-primary transition-all">
<div class="w-8 h-8 border-2 border-white/60 rounded-[2px]"></div>
</div>
<span class="font-label-md text-label-md text-on-surface-variant">Original</span>
</div>
<div class="flex flex-col items-center gap-2 min-w-[72px] cursor-pointer">
<div class="w-14 h-14 rounded-lg bg-white flex items-center justify-center border-2 border-white ring-2 ring-white/20 transition-all">
<div class="w-4 h-8 border-2 border-black rounded-[2px]"></div>
</div>
<span class="font-label-md text-label-md text-white">9:16</span>
</div>
<div class="flex flex-col items-center gap-2 min-w-[72px] cursor-pointer group">
<div class="w-14 h-14 rounded-lg bg-surface-variant/30 flex items-center justify-center border border-outline-variant group-hover:border-primary transition-all">
<div class="w-8 h-4 border-2 border-white/60 rounded-[2px]"></div>
</div>
<span class="font-label-md text-label-md text-on-surface-variant">16:9</span>
</div>
<div class="flex flex-col items-center gap-2 min-w-[72px] cursor-pointer group">
<div class="w-14 h-14 rounded-lg bg-surface-variant/30 flex items-center justify-center border border-outline-variant group-hover:border-primary transition-all">
<div class="w-6 h-6 border-2 border-white/60 rounded-[2px]"></div>
</div>
<span class="font-label-md text-label-md text-on-surface-variant">1:1</span>
</div>
<div class="flex flex-col items-center gap-2 min-w-[72px] cursor-pointer group">
<div class="w-14 h-14 rounded-lg bg-surface-variant/30 flex items-center justify-center border border-outline-variant group-hover:border-primary transition-all">
<div class="w-8 h-6 border-2 border-white/60 rounded-[2px]"></div>
</div>
<span class="font-label-md text-label-md text-on-surface-variant">4:3</span>
</div>
<div class="flex flex-col items-center gap-2 min-w-[72px] cursor-pointer group">
<div class="w-14 h-14 rounded-lg bg-surface-variant/30 flex items-center justify-center border border-outline-variant group-hover:border-primary transition-all">
<div class="w-10 h-4 border-2 border-white/60 rounded-[2px]"></div>
</div>
<span class="font-label-md text-label-md text-on-surface-variant">2.35:1</span>
</div>
</div>
</div>
<!-- Resolution Section -->
<div class="mb-6">
<h2 class="font-headline-md text-headline-md text-white mb-4">Resolution</h2>
<div class="space-y-1">
<label class="flex items-center justify-between p-3 rounded-xl hover:bg-white/5 transition-colors cursor-pointer group">
<div class="flex items-center gap-4">
<div class="w-5 h-5 rounded-full border-2 border-outline flex items-center justify-center group-hover:border-primary"></div>
<span class="font-body-md text-body-md text-on-surface-variant">480p</span>
</div>
<input class="hidden" name="res" type="radio"/>
</label>
<label class="flex items-center justify-between p-3 rounded-xl hover:bg-white/5 transition-colors cursor-pointer group">
<div class="flex items-center gap-4">
<div class="w-5 h-5 rounded-full border-2 border-outline flex items-center justify-center"></div>
<span class="font-body-md text-body-md text-on-surface-variant">720p - HD</span>
</div>
<input class="hidden" name="res" type="radio"/>
</label>
<label class="flex items-center justify-between p-3 rounded-xl bg-primary-container/10 border border-primary-container/20 transition-colors cursor-pointer group">
<div class="flex items-center gap-4">
<div class="w-5 h-5 rounded-full border-2 border-primary-container flex items-center justify-center">
<div class="w-2.5 h-2.5 bg-primary-container rounded-full"></div>
</div>
<span class="font-body-md text-body-md text-white">1080p - Full HD</span>
</div>
<span class="bg-primary-container text-on-primary-container font-label-md text-[10px] px-2 py-0.5 rounded-full uppercase tracking-tighter">Recommended</span>
<input checked="" class="hidden" name="res" type="radio"/>
</label>
<label class="flex items-center justify-between p-3 rounded-xl hover:bg-white/5 transition-colors cursor-pointer group">
<div class="flex items-center gap-4">
<div class="w-5 h-5 rounded-full border-2 border-outline flex items-center justify-center"></div>
<span class="font-body-md text-body-md text-on-surface-variant">2K</span>
</div>
<input class="hidden" name="res" type="radio"/>

<label class="flex items-center justify-between p-3 rounded-xl hover:bg-white/5 transition-colors cursor-pointer group">
<div class="flex items-center gap-4">
<div class="w-5 h-5 rounded-full border-2 border-outline flex items-center justify-center"></div>
<span class="font-body-md text-body-md text-on-surface-variant">4K</span>
</div>
<input class="hidden" name="res" type="radio"/>
</label>
</div>
</div>
<!-- Frame Rate Section -->
<div class="mb-12">

<div class="flex gap-2 overflow-x-auto custom-scrollbar pb-4">
<button class="px-6 py-2 rounded-full border border-outline-variant text-on-surface-variant font-label-md text-label-md hover:border-primary transition-all">24fps</button>
<button class="px-6 py-2 rounded-full border border-outline-variant text-on-surface-variant font-label-md text-label-md hover:border-primary transition-all">25fps</button>
<button class="px-6 py-2 rounded-full bg-white text-black font-label-md text-label-md shadow-lg shadow-white/10">30fps</button>
<button class="px-6 py-2 rounded-full border border-outline-variant text-on-surface-variant font-label-md text-label-md hover:border-primary transition-all">50fps</button>
<button class="px-6 py-2 rounded-full border border-outline-variant text-on-surface-variant font-label-md text-label-md hover:border-primary transition-all">60fps</button>
</div>
</div>
</section>
</main>
<!-- Bottom Navigation Mockup (Filtered out as this is a task-focused screen) -->
<div class="fixed bottom-6 left-1/2 -translate-x-1/2 w-3/4 flex items-center justify-center pointer-events-none opacity-0">
<!-- Suppression for focused task UI -->
</div>
<script>
    // Micro-interactions for ratio items
    document.querySelectorAll('.cursor-pointer').forEach(item => {
      item.addEventListener('click', function() {
        const parent = this.parentElement;
        if(parent.classList.contains('flex-col')) return; // Avoid re-selecting already active
        
        // This is a simple visual swap for the prototype
        console.log('Aspect ratio selected:', this.innerText);
      });
    });
  </script>
</body></html>
