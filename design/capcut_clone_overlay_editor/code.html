<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Kinetic Noir - Overlay Editor</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700;800&amp;family=Geist:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-fixed-dim": "#ffb1c1",
                        "primary-fixed": "#ffd9df",
                        "tertiary": "#5ce069",
                        "on-tertiary-container": "#00320a",
                        "on-primary-fixed": "#3f0018",
                        "outline": "#a9888e",
                        "on-secondary-fixed-variant": "#7b008f",
                        "surface-container-high": "#362529",
                        "on-error": "#690005",
                        "surface": "#1e0f12",
                        "tertiary-fixed": "#79fe82",
                        "primary-container": "#ff4c86",
                        "inverse-on-surface": "#3d2c2f",
                        "error-container": "#93000a",
                        "surface-container-highest": "#423033",
                        "on-primary-fixed-variant": "#8f003f",
                        "inverse-surface": "#f8dbe0",
                        "on-secondary": "#570066",
                        "surface-dim": "#1e0f12",
                        "on-tertiary-fixed-variant": "#005317",
                        "secondary": "#f9abff",
                        "background": "#000000", /* Overridden for OLED Pure Black as requested */
                        "secondary-container": "#86039c",
                        "on-primary-container": "#590024",
                        "surface-container-low": "#27171a",
                        "inverse-primary": "#bb0054",
                        "surface-variant": "#423033",
                        "tertiary-container": "#0fa739",
                        "on-surface-variant": "#e2bdc3",
                        "tertiary-fixed-dim": "#5ce069",
                        "on-tertiary-fixed": "#002105",
                        "primary": "#ffb1c1",
                        "surface-container-lowest": "#180a0d",
                        "surface-tint": "#ffb1c1",
                        "on-primary": "#66002a",
                        "secondary-fixed-dim": "#f9abff",
                        "on-surface": "#f8dbe0",
                        "on-error-container": "#ffdad6",
                        "on-secondary-fixed": "#35003f",
                        "on-secondary-container": "#f7a0ff",
                        "on-tertiary": "#00390d",
                        "secondary-fixed": "#ffd6fe",
                        "error": "#ffb4ab",
                        "outline-variant": "#5a4045",
                        "surface-container": "#2b1b1e",
                        "on-background": "#f8dbe0",
                        "surface-bright": "#473438"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "unit": "4px",
                        "gutter": "12px",
                        "container-padding": "16px",
                        "touch-target-min": "44px"
                    },
                    "fontFamily": {
                        "body-lg": ["Geist"],
                        "headline-lg": ["Hanken Grotesk"],
                        "body-md": ["Geist"],
                        "label-sm": ["Geist"],
                        "headline-md": ["Hanken Grotesk"],
                        "display": ["Hanken Grotesk"],
                        "label-md": ["Geist"]
                    },
                    "fontSize": {
                        "body-lg": ["16px", {"lineHeight": "1.6", "fontWeight": "400"}],
                        "headline-lg": ["24px", {"lineHeight": "1.3", "fontWeight": "700"}],
                        "body-md": ["14px", {"lineHeight": "1.5", "fontWeight": "400"}],
                        "label-sm": ["10px", {"lineHeight": "1.2", "fontWeight": "500"}],
                        "headline-md": ["20px", {"lineHeight": "1.4", "fontWeight": "700"}],
                        "display": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "800"}],
                        "label-md": ["12px", {"lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "600"}]
                    }
                },
            },
        }
    </script>
<style>
        body {
            background-color: #000000;
            color: #f8dbe0;
            overflow: hidden;
            height: 100vh;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }
        .timeline-scroll::-webkit-scrollbar { display: none; }
        .toolbar-scroll::-webkit-scrollbar { display: none; }
        .glass-panel {
            background: rgba(10, 10, 10, 0.6);
            backdrop-filter: blur(20px);
        }
        .primary-gradient {
            background: linear-gradient(135deg, #ff4081 0%, #9c27b0 100%);
        }
        .primary-gradient-border {
            border: 2px solid;
            border-image-source: linear-gradient(135deg, #ff4081 0%, #9c27b0 100%);
            border-image-slice: 1;
        }
        .dashed-selection {
            border: 1.5px dashed white;
        }
        .handle-dot {
            width: 12px;
            height: 12px;
            background: white;
            border-radius: 50%;
            position: absolute;
            box-shadow: 0 0 4px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body class="flex flex-col">
<!-- Top AppBar -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-container-padding h-14 bg-surface-container-lowest/80 backdrop-blur-md border-b border-outline-variant/20">
<div class="flex items-center gap-4">
<button class="flex items-center justify-center w-touch-target-min h-touch-target-min active:scale-95 transition-transform duration-150">
<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</button>
<h1 class="text-headline-md font-headline-md font-bold tracking-tight text-on-surface">Overlay</h1>
</div>
<div class="flex items-center gap-2">
<button class="flex items-center gap-1 text-primary-container font-label-md px-3 py-1.5 active:scale-95 transition-transform">
<span class="material-symbols-outlined text-primary-container">add</span>
<span class="font-bold">Add overlay</span>
</button>
<button class="flex items-center justify-center w-touch-target-min h-touch-target-min text-primary-container active:scale-90 transition-transform">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</button>
</div>
</header>
<!-- Main Editor Canvas Zone -->
<main class="relative w-full h-[50vh] mt-14 bg-black flex items-center justify-center overflow-hidden">
<!-- Background Video Placeholder -->
<div class="absolute inset-0 z-0">
<img alt="Cinematic neon city at night with purple and pink glowing lights" class="w-full h-full object-cover opacity-60" src="https://lh3.googleusercontent.com/aida/ADBb0uivB-0G8a6NWc_bZf9db3WQiLXzEHBnqAqNKAP5fzC-p4JsGChgG699hMfpHbjfVRkcmVD-ntdGFyx4Ka6fnHL_rNRdpGdwRg3vIpa6mSNOUMsn8mggO-QhSDHFFfdLBNQKiCyY5INyigWmysb8kRcfF-suTDhGTF2VoJdde7EXLGZ3azLQi0UE-1KssiMvJIBVW7B3UMwzh2QPgc9HzwqVvcerue_dlBRSsTL_AITFNfbo13iJos7Ilpw"/>
</div>
<!-- Overlay Object (Selected State) -->
<div class="relative z-10 w-64 aspect-square dashed-selection group">
<!-- Overlay Content -->
<img alt="Abstract digital waves with pink and dark blue kinetic energy patterns" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida/ADBb0uitl6gMYN10_QIb07-TkCqsBqQBhSYhnDfLxvaQIIcoAmZbP6PC5SG-eg7HWjWGTkp0IFpdBHnzOfqgB5iybrR2SOITmsl2A6aVJRQLkAxod1T8_yXj5rxlM6GRJh0Alir_Bn4r3RYWfOLl9wzSbBb1SMR4COtHPJ0RPOZD7Mg00R3A3zZA5-huy1IcjzJdqmHK6-RAck3XiUaSLzEdV5lXalRn3QQGVTCKni82_6gSd2VZ_EL99mJh7e8"/>
<!-- Resize Handles -->
<div class="handle-dot -top-1.5 -left-1.5"></div>
<div class="handle-dot -top-1.5 -right-1.5"></div>
<div class="handle-dot -bottom-1.5 -left-1.5"></div>
<div class="handle-dot -bottom-1.5 -right-1.5"></div>
<!-- Rotation Handle -->
<div class="absolute -top-10 left-1/2 -translate-x-1/2 flex flex-col items-center">
<div class="w-px h-6 bg-white"></div>
<div class="handle-dot relative"></div>
</div>
<!-- Corner Badges -->
<button class="absolute -top-4 -left-4 w-8 h-8 bg-black/80 rounded-full flex items-center justify-center border border-white/20">
<span class="material-symbols-outlined text-sm">delete_outline</span>
</button>
<button class="absolute -top-4 -right-4 w-8 h-8 bg-black/80 rounded-full flex items-center justify-center border border-white/20">
<span class="material-symbols-outlined text-sm">content_copy</span>
</button>
<button class="absolute -bottom-4 -right-4 w-8 h-8 bg-black/80 rounded-full flex items-center justify-center border border-white/20">
<span class="material-symbols-outlined text-sm">fullscreen</span>
</button>
</div>
<!-- Playback Controls overlay (Contextual) -->
<div class="absolute bottom-4 left-1/2 -translate-x-1/2 flex items-center gap-6 px-4 py-2 bg-black/40 backdrop-blur-md rounded-full border border-white/10">
<span class="material-symbols-outlined text-white">replay_10</span>
<span class="material-symbols-outlined text-white scale-125" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
<span class="material-symbols-outlined text-white">forward_10</span>
</div>
</main>
<!-- Timeline Zone -->
<section class="flex-grow flex flex-col bg-surface-container-lowest border-t border-outline-variant/10">
<!-- Time Marker -->
<div class="flex justify-center py-2 text-label-sm text-on-surface-variant font-mono">
            00:00:12:04 / 00:00:24:15
        </div>
<div class="relative flex-grow overflow-x-auto timeline-scroll bg-black/40">
<div class="h-full min-w-[200%] px-[50%] flex flex-col justify-center gap-3 relative">
<!-- Main Track -->
<div class="h-10 w-full bg-surface-variant/30 rounded-sm relative overflow-hidden border border-white/5">
<div class="absolute inset-0 flex">
<div class="w-1/4 h-full border-r border-white/10 opacity-20 bg-primary/5"></div>
<div class="w-1/4 h-full border-r border-white/10 opacity-20"></div>
<div class="w-1/4 h-full border-r border-white/10 opacity-20 bg-primary/5"></div>
</div>
</div>
<!-- Overlay Track (Active/Selected) -->
<div class="h-10 w-2/3 ml-12 primary-gradient rounded-sm relative shadow-lg shadow-primary-container/20 ring-2 ring-white">
<div class="absolute inset-0 flex items-center justify-between px-1">
<!-- Trim Handle Left -->
<div class="w-1.5 h-6 bg-white rounded-full"></div>
<div class="flex-grow px-2 truncate font-label-sm text-white font-bold">Overlay Clip 1</div>
<!-- Trim Handle Right -->
<div class="w-1.5 h-6 bg-white rounded-full"></div>
</div>
</div>
<!-- Global Playhead -->
<div class="absolute top-0 bottom-0 left-1/2 -translate-x-1/2 w-0.5 bg-white z-20">
<div class="absolute -top-1 left-1/2 -translate-x-1/2 w-0 h-0 border-l-[6px] border-l-transparent border-r-[6px] border-r-transparent border-t-[8px] border-t-white"></div>
</div>
</div>
</div>
</section>
<!-- Toolbar Zone -->
<footer class="fixed bottom-0 left-0 w-full z-50 bg-surface-container-low/90 backdrop-blur-xl border-t border-outline-variant/10 shadow-lg">
<div class="flex overflow-x-auto toolbar-scroll px-gutter py-4 gap-6 items-start">
<!-- Tool Item -->
<button class="flex flex-col items-center justify-center min-w-[56px] gap-2 text-on-surface-variant active:scale-90 transition-transform">
<span class="material-symbols-outlined text-2xl">content_cut</span>
<span class="text-label-sm font-label-sm">Split</span>
</button>
<button class="flex flex-col items-center justify-center min-w-[56px] gap-2 text-on-surface-variant active:scale-90 transition-transform">
<span class="material-symbols-outlined text-2xl">crop</span>
<span class="text-label-sm font-label-sm">Crop</span>
</button>
<button class="flex flex-col items-center justify-center min-w-[56px] gap-2 text-on-surface-variant active:scale-90 transition-transform">
<span class="material-symbols-outlined text-2xl">tune</span>
<span class="text-label-sm font-label-sm">Adjust</span>
</button>
<button class="flex flex-col items-center justify-center min-w-[56px] gap-2 text-on-surface-variant active:scale-90 transition-transform">
<span class="material-symbols-outlined text-2xl">photo_filter</span>
<span class="text-label-sm font-label-sm">Filter</span>
</button>
<button class="flex flex-col items-center justify-center min-w-[56px] gap-2 text-on-surface-variant active:scale-90 transition-transform">
<span class="material-symbols-outlined text-2xl">animation</span>
<span class="text-label-sm font-label-sm">Animate</span>
</button>
<button class="flex flex-col items-center justify-center min-w-[56px] gap-2 text-on-surface-variant active:scale-90 transition-transform">
<span class="material-symbols-outlined text-2xl">flip</span>
<span class="text-label-sm font-label-sm">Flip</span>
</button>
<button class="flex flex-col items-center justify-center min-w-[56px] gap-2 text-on-surface-variant active:scale-90 transition-transform">
<span class="material-symbols-outlined text-2xl">layers</span>
<span class="text-label-sm font-label-sm">Blend</span>
</button>
<button class="flex flex-col items-center justify-center min-w-[56px] gap-2 text-on-surface-variant active:scale-90 transition-transform">
<span class="material-symbols-outlined text-2xl">opacity</span>
<span class="text-label-sm font-label-sm">Opacity</span>
</button>
<button class="flex flex-col items-center justify-center min-w-[56px] gap-2 text-on-surface-variant active:scale-90 transition-transform">
<span class="material-symbols-outlined text-2xl">color_lens</span>
<span class="text-label-sm font-label-sm">Chroma</span>
</button>
</div>
<!-- Safety bottom padding for notched phones -->
<div class="h-safe"></div>
</footer>
<!-- Interaction Script -->
<script>
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('touchstart', () => {
                btn.style.opacity = '0.7';
            });
            btn.addEventListener('touchend', () => {
                btn.style.opacity = '1';
            });
        });

        // Simple horizontal scroll sync or mock effects can go here
        const timeline = document.querySelector('.timeline-scroll');
        if (timeline) {
            timeline.scrollLeft = timeline.scrollWidth / 4;
        }
    </script>
</body></html>
