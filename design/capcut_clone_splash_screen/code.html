<style>
        body {
            background-color: #000000;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .splash-canvas {
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #000000;
            position: relative;
        }
        .loading-bar-container {
            position: absolute;
            bottom: 48px;
            left: 50%;
            transform: translateX(-50%);
            width: 160px;
            height: 4px;
            background-color: #333333;
            border-radius: 9999px;
            overflow: hidden;
        }
        .loading-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #FF4081 0%, #9C27B0 100%);
            border-radius: 9999px;
            animation: progress 3s cubic-bezier(0.65, 0, 0.35, 1) forwards;
        }
        @keyframes progress {
            0% { width: 0%; }
            20% { width: 15%; }
            50% { width: 45%; }
            80% { width: 85%; }
            100% { width: 100%; }
        }
        .fade-in-up {
            animation: fadeInUp 1s ease-out forwards;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .status-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 44px;
            padding: 0 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }
