<script>
        // Simulate minor progress increment for micro-interaction
        document.addEventListener('DOMContentLoaded', () => {
            const progressCircle = document.querySelector('.progress-ring__circle');
            const linearProgress = document.querySelector('.animate-pulse-glow');
            const percentText = document.querySelector('.font-display.text-white');
            
            let progress = 67;
            const radius = 60;
            const circumference = 2 * Math.PI * radius;

            const updateProgress = (val) => {
                const offset = circumference - (val / 100) * circumference;
                progressCircle.style.strokeDashoffset = offset;
                linearProgress.style.width = `${val}%`;
                percentText.textContent = `${Math.floor(val)}%`;
            };

            // Set initial state
            updateProgress(67);

            // Subtle creep for realism
            setInterval(() => {
                if (progress < 99) {
                    progress += 0.05;
                    updateProgress(progress);
                }
            }, 500);
        });
    </script>
