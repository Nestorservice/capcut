            border-top: 2px solid #FF4081;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }

            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }

<span class="font-label-md text-label-md text-on-surface truncate max-w-[110px]">Foggy Pass Vlog</span>

<!-- Card 4 -->

<div class="absolute bottom-2 right-2 px-1.5 py-0.5 rounded bg-black/60 backdrop-blur-md">

<div class="p-3 flex justify-between items-start">

<!-- FAB: Create New Project -->
<button class="fixed right-6 bottom-20 w-14 h-14 primary-gradient rounded-full shadow-2xl flex items-center justify-center text-white z-50 transition-transform active:scale-90 active:shadow-inner">

</button>
<!-- Bottom Navigation Bar (Shared Component Strategy) -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center h-16 px-gutter bg-surface-container-lowest/80 backdrop-blur-xl border-t border-outline-variant">
<div class="flex flex-col items-center justify-center text-primary transition-transform active:scale-90">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">folder</span>

<div class="flex flex-col items-center justify-center text-on-surface-variant hover:text-primary-container transition-transform active:scale-90">
<span class="material-symbols-outlined">settings</span>

<script>
        // Simple micro-interaction for filter tabs
        const tabs = document.querySelectorAll('.filter-tab');
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => {
                    t.classList.remove('primary-gradient', 'text-white');
                    t.classList.add('bg-surface-container', 'text-on-surface-variant');
                });
                tab.classList.add('primary-gradient', 'text-white');
                tab.classList.remove('bg-surface-container', 'text-on-surface-variant');
            });
        });
    </script>
