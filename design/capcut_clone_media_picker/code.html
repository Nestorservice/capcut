        // Simple micro-interaction for item selection
        document.querySelectorAll('.media-grid > div:not(:first-child)').forEach(item => {
            item.addEventListener('click', () => {
                // In a real app, this would toggle selection state
                // For this demo, we just add a small click effect
                item.style.opacity = '0.5';
                setTimeout(() => {
                    item.style.opacity = '1';
                }, 100);
            });
        });
