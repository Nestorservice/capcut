<!-- Interactive script for some basic UI feel -->
<script>
        // Simple tool selection interaction
        const tools = document.querySelectorAll('.group');
        tools.forEach(tool => {
            tool.addEventListener('click', () => {
                // Clear active states
                tools.forEach(t => {
                    const label = t.querySelector('span:last-child');
                    const dot = t.querySelector('div');
                    if(label) label.classList.replace('text-white', 'text-[#888888]');
                    if(dot) dot.remove();
                });
                
                // Set active state
                const label = tool.querySelector('span:last-child');
                label.classList.replace('text-[#888888]', 'text-white');
                
                const dot = document.createElement('div');
                dot.className = 'w-1 h-1 bg-[#ff4081] rounded-full active-tool-glow';
                tool.appendChild(dot);
            });
        });
    </script>
