        .video-canvas {

            background-color: #000000;

        }

        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;

<body class="flex flex-col h-screen">
<!-- Top App Bar (From Shared Components Protocol) -->
<header class="flex justify-between items-center px-container-padding h-14 w-full bg-surface dark:bg-surface fixed top-0 z-50">

</button>

</button>
</header>

<div class="absolute bottom-4 left-1/2 -translate-x-1/2 w-8 h-8 rounded-full bg-white flex items-center justify-center split-handle">
<span class="material-symbols-outlined text-black text-sm">swap_horiz</span>
</div>
</div>
</div>
</div>
<!-- Timestamp -->
<div class="mt-4 font-mono text-on-surface tracking-widest text-lg font-bold">

            </div>
</section>
<!-- TIMELINE ZONE -->

<div class="relative h-24 w-full overflow-hidden">
<!-- Timeline Scroll Area -->
<div class="timeline-scroll flex items-center px-[50%] h-full overflow-x-auto space-x-2">
<!-- Clip 1 -->

<div class="absolute inset-y-0 left-1/3 w-px bg-white/30"></div>
<div class="absolute inset-y-0 right-1/4 w-px bg-white/30"></div>
</div>
<!-- Clip 3 -->
<div class="flex-shrink-0 w-40 h-16 rounded-md bg-surface-container-highest border border-outline-variant relative opacity-60">

</div>
</div>
<!-- Playhead / Cursor (Fixed Center) -->
<div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
<div class="mb-1 bg-white p-1 rounded-sm shadow-lg">
<span class="material-symbols-outlined text-[16px] text-black leading-none">content_cut</span>
</div>
<div class="h-20 w-0.5 bg-white shadow-[0_0_8px_rgba(255,255,255,0.5)]"></div>
</div>
</div>
</section>
<!-- BOTTOM CONTROLS -->
<section class="p-container-padding space-y-4 pb-8">
<button class="w-full h-14 gradient-primary rounded-xl flex items-center justify-center space-x-3 active:scale-[0.98] transition-all duration-200 shadow-lg">
<span class="material-symbols-outlined text-white">content_cut</span>
<span class="text-white font-headline-md text-headline-md tracking-tight">Split here</span>
</button>
<button class="w-full py-2 text-on-surface-variant font-label-md text-label-md uppercase tracking-widest hover:text-white transition-colors active:opacity-50">
                Split into equal parts
            </button>
</section>
</main>

<script>
        // Simple haptic-like feedback on interactions
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', () => {
                if (window.navigator.vibrate) {
                    window.navigator.vibrate(5);
                }
            });
        });

        // Sync timeline scroll with a subtle parallax or snap effect if needed
        const timeline = document.querySelector('.timeline-scroll');
        timeline.addEventListener('scroll', () => {

        });
