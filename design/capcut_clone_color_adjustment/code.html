<!-- Global Interactions Script -->
<script>
        // Simple logic for the comparison handle interaction
        const handle = document.querySelector('.cursor-grab');
        const container = handle.parentElement.parentElement;
        const dividerLine = handle.parentElement;
        const originalPanel = container.children[0].children[0];

        let isDragging = false;

        handle.addEventListener('mousedown', () => isDragging = true);
        window.addEventListener('mouseup', () => isDragging = false);
        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const rect = container.getBoundingClientRect();
            let x = e.clientX - rect.left;
            if (x < 0) x = 0;
            if (x > rect.width) x = rect.width;
            
            const percent = (x / rect.width) * 100;
            dividerLine.style.left = `${percent}%`;
            originalPanel.style.width = `${percent}%`;
        });

        // Touch support
        handle.addEventListener('touchstart', () => isDragging = true);
        window.addEventListener('touchend', () => isDragging = false);
        window.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            const rect = container.getBoundingClientRect();
            let x = e.touches[0].clientX - rect.left;
            if (x < 0) x = 0;
            if (x > rect.width) x = rect.width;
            
            const percent = (x / rect.width) * 100;
            dividerLine.style.left = `${percent}%`;
            originalPanel.style.width = `${percent}%`;
        });
    </script>
