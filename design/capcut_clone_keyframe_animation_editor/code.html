<style>
        body {

            color: #f8dbe0;

        }

        }

            background: #333333;
            border-radius: 5px;
            background-image: linear-gradient(#ff4c86, #ff4c86);
            background-repeat: no-repeat;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 12px;
            width: 12px;
            border-radius: 50%;
            background: #ffffff;

<body class="h-screen w-screen flex flex-col">
<!-- Top App Bar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-container-padding h-touch-target-min bg-black/80 backdrop-blur-md border-b border-outline-variant">
<div class="flex items-center gap-4">
<button class="flex items-center justify-center p-2 hover:bg-surface-container-high transition-colors rounded-full text-on-surface">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md text-on-surface font-bold">Keyframe</h1>
</div>
<div class="flex items-center gap-4">
<button class="flex items-center gap-1.5 px-3 py-1.5 rounded-full border border-primary-container text-primary-container hover:bg-primary-container/10 transition-all active:scale-95">
<span class="material-symbols-outlined text-[18px]">add_circle</span>
<span class="font-label-md text-label-md">Add keyframe</span>
</button>
<button class="flex items-center justify-center p-2 text-primary-container hover:bg-primary-container/10 transition-colors rounded-full">
<span class="material-symbols-outlined">check</span>
</button>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 mt-[44px] flex flex-col">
<!-- Preview Zone (40%) -->
<section class="h-[40%] relative w-full bg-black flex items-center justify-center overflow-hidden">
<div class="relative aspect-video w-[90%] canvas-shadow group">

<!-- SVG Overlay for Motion Path -->
<svg class="absolute inset-0 w-full h-full pointer-events-none">
<path class="keyframe-path opacity-60" d="M 50 150 Q 200 50 400 180" fill="none" stroke="#facc15" stroke-width="2"></path>
<circle cx="50" cy="150" fill="#facc15" r="4"></circle>
<circle cx="210" cy="85" fill="#ffffff" r="5" stroke="#ff4c86" stroke-width="2"></circle> <!-- Selected -->
<circle cx="400" cy="180" fill="#facc15" r="4"></circle>
</svg>
<!-- Stylized Graphic (Overlay Element) -->
<div class="absolute top-[85px] left-[210px] -translate-x-1/2 -translate-y-1/2 border-2 border-primary-container w-24 h-24 flex items-center justify-center">

<span class="material-symbols-outlined text-primary-container text-4xl">animation</span>
<div class="absolute -top-1 -left-1 w-2 h-2 bg-white"></div>
<div class="absolute -top-1 -right-1 w-2 h-2 bg-white"></div>
<div class="absolute -bottom-1 -left-1 w-2 h-2 bg-white"></div>

</div>
</div>
</section>
<!-- Timeline Zone (30%) -->

</div>
<!-- Opacity -->

</div>
<input class="w-full accent-primary-container" max="100" min="0" type="range" value="100"/>
</div>
<!-- Delete Button -->
<div class="flex justify-center pt-4 pb-12">
<button class="flex items-center gap-2 text-error px-6 py-2 rounded-full hover:bg-error/10 transition-colors">
<span class="material-symbols-outlined text-[20px]">delete_outline</span>
<span class="font-label-md text-label-md font-bold uppercase tracking-widest">Delete keyframe</span>
</button>
</div>
</section>
</main>
<!-- Navigation (Hidden on mobile as per requirement for "full verticality" editor, but following Shared Component Logic for Shell Visibility) -->
<!-- BottomNavBar would be suppressed here due to "Task-Focused" rule -->
<script>
        // Micro-interactions for inputs
        document.querySelectorAll('input[type="range"]').forEach(slider => {
            slider.addEventListener('input', (e) => {
                const value = (slider.value - slider.min) / (slider.max - slider.min) * 100;
                slider.style.backgroundSize = value + '% 100%';
            });
            // Initial state
            const val = (slider.value - slider.min) / (slider.max - slider.min) * 100;
            slider.style.backgroundSize = val + '% 100%';
        });

        // Numeric stepper simulation
        document.querySelectorAll('input[type="number"]').forEach(input => {
            input.addEventListener('wheel', (e) => {
                e.preventDefault();
                const delta = Math.sign(e.deltaY) * -1;
                input.value = parseInt(input.value) + delta;
            });
        });
    </script>
