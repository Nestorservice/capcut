<script>
        // Micro-interaction for project cards
        document.querySelectorAll('.group').forEach(card => {
            card.addEventListener('touchstart', () => {
                card.classList.add('scale-[0.98]');
            });
            card.addEventListener('touchend', () => {
                card.classList.remove('scale-[0.98]');
            });
        });

        // Tab selection logic
        const tabs = document.querySelectorAll('nav button');
        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => {
                    t.classList.remove('active-tab-indicator', 'text-on-surface');
                    t.classList.add('text-on-surface-variant');
                });
                tab.classList.add('active-tab-indicator', 'text-on-surface');
                tab.classList.remove('text-on-surface-variant');
            });
        });

        // Nav selection logic
        const navItems = document.querySelectorAll('footer button');
        navItems.forEach(item => {
            item.addEventListener('click', () => {
                navItems.forEach(i => {
                    i.classList.remove('text-primary', 'font-bold');
                    i.classList.add('text-on-surface-variant');
                    const icon = i.querySelector('.material-symbols-outlined');
                    icon.style.fontVariationSettings = "'FILL' 0";
                });
                item.classList.add('text-primary', 'font-bold');
                item.classList.remove('text-on-surface-variant');
                const icon = item.querySelector('.material-symbols-outlined');
                icon.style.fontVariationSettings = "'FILL' 1";
            });
        });
    </script>
