<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Video Text Editor</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;600;700;800&amp;family=Geist:wght@400;500;600&amp;family=Playfair+Display:wght@700&amp;family=Pacifico&amp;family=Courier+Prime:wght@700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .active-icon {
            font-variation-settings: 'FILL' 1;
        }
        /* Custom scrollbar for horizontal pills */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .dashed-border {
            background-image: url("data:image/svg+xml,%3csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg'%3e%3crect width='100%25' height='100%25' fill='none' stroke='white' stroke-width='2' stroke-dasharray='6%2c 6' stroke-dashoffset='0' stroke-linecap='square'/%3e%3c/svg%3e");
        }
        .cursor-blink {
            animation: blink 1s step-end infinite;
        }
        @keyframes blink {
            from, to { border-color: transparent }
            50% { border-color: white }
        }
        .bg-gradient-primary {
            background: linear-gradient(135deg, #FF4081 0%, #9C27B0 100%);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container": "#2b1b1e",
                        "on-background": "#f8dbe0",
                        "surface-bright": "#473438",
                        "outline-variant": "#5a4045",
                        "surface-container-lowest": "#180a0d",
                        "surface-tint": "#ffb1c1",
                        "on-primary": "#66002a",
                        "secondary-fixed-dim": "#f9abff",
                        "on-surface": "#f8dbe0",
                        "on-error-container": "#ffdad6",
                        "on-secondary-fixed": "#35003f",
                        "on-secondary-container": "#f7a0ff",
                        "on-tertiary": "#00390d",
                        "secondary-fixed": "#ffd6fe",
                        "error": "#ffb4ab",
                        "on-surface-variant": "#e2bdc3",
                        "tertiary-fixed-dim": "#5ce069",
                        "on-tertiary-fixed": "#002105",
                        "primary": "#ffb1c1",
                        "surface-dim": "#1e0f12",
                        "on-tertiary-fixed-variant": "#005317",
                        "secondary": "#f9abff",
                        "background": "#000000",
                        "secondary-container": "#86039c",
                        "on-primary-container": "#590024",
                        "surface-container-low": "#27171a",
                        "inverse-primary": "#bb0054",
                        "surface-variant": "#423033",
                        "tertiary-container": "#0fa739",
                        "tertiary-fixed": "#79fe82",
                        "primary-container": "#ff4c86",
                        "inverse-on-surface": "#3d2c2f",
                        "error-container": "#93000a",
                        "surface-container-highest": "#423033",
                        "on-primary-fixed-variant": "#8f003f",
                        "inverse-surface": "#f8dbe0",
                        "on-secondary": "#570066",
                        "surface-container-high": "#362529",
                        "on-error": "#690005",
                        "surface": "#1e0f12",
                        "primary-fixed-dim": "#ffb1c1",
                        "primary-fixed": "#ffd9df",
                        "tertiary": "#5ce069",
                        "on-tertiary-container": "#00320a",
                        "on-primary-fixed": "#3f0018",
                        "outline": "#a9888e",
                        "on-secondary-fixed-variant": "#7b008f"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "12px",
                        "container-padding": "16px",
                        "touch-target-min": "44px",
                        "unit": "4px"
                    },
                    "fontFamily": {
                        "display": ["Hanken Grotesk"],
                        "label-sm": ["Geist"],
                        "headline-md": ["Hanken Grotesk"],
                        "label-md": ["Geist"],
                        "body-lg": ["Geist"],
                        "headline-lg": ["Hanken Grotesk"],
                        "body-md": ["Geist"]
                    },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-black text-on-surface font-body-md overflow-hidden h-screen flex flex-col">
<!-- Top App Bar -->
<header class="flex justify-between items-center w-full px-container-padding h-touch-target-min bg-black z-50">
<button class="hover:opacity-80 transition-opacity active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md-mobile font-bold text-on-surface">Text</h1>
<button class="hover:opacity-80 transition-opacity active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined text-primary-container" style="font-variation-settings: 'FILL' 1;">check</span>
</button>
</header>
<!-- Canvas Zone (Top 45%) -->
<main class="relative w-full h-[45%] flex items-center justify-center overflow-hidden">
<!-- Video Content Placeholder -->
<div class="absolute inset-0 bg-[#000000] flex items-center justify-center">
<img class="w-full h-full object-cover opacity-60" data-alt="A cinematic, high-contrast close-up of a vibrant neon city street at night, reflected in rain-slicked pavement. The lighting is dominated by deep magenta and electric purple hues against an absolute black sky. The atmosphere is professional, moody, and sleek, mimicking high-end video editing software aesthetics with sharp focus and deep blacks." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBCUDEOzP7ixK5zLTP_s0sMxFEF-rKyjWIc0WWq1l_Ejqg0rqww-Z_1tzW82uNcnayCWk1Y8rXW4-jXypY-8uAXbyxgQ6GsmrAtT3bxjTSySuMqO4p264nwjdAZyDPBdV0xH6HwQgaODKO_giPBY1lcIh58Rib1CCaBW6M-8CVSenKA8Wm504p8k8e4hIpBOi_zlK5NljscLk90CUGqpSnLaI08_mvB_YaHylT3-EGBh03DJ5xYDKp8UKYeMedWVpT_NnN6Lt1tHZE"/>
</div>
<!-- Text Overlay Element -->
<div class="relative z-10 p-6">
<div class="relative dashed-border px-8 py-4">
<span class="font-display text-[32px] font-extrabold text-white tracking-tight">Your text here</span>
<!-- Corner Handles -->
<div class="absolute -top-1.5 -left-1.5 w-3 h-3 bg-white rounded-full"></div>
<div class="absolute -top-1.5 -right-1.5 w-3 h-3 bg-white rounded-full"></div>
<div class="absolute -bottom-1.5 -left-1.5 w-3 h-3 bg-white rounded-full"></div>
<div class="absolute -bottom-1.5 -right-1.5 w-3 h-3 bg-white rounded-full"></div>
<!-- Rotation Handle -->
<div class="absolute -top-10 left-1/2 -translate-x-1/2 flex flex-col items-center">
<div class="w-8 h-8 bg-white rounded-full flex items-center justify-center shadow-lg">
<span class="material-symbols-outlined text-black text-[18px]">rotate_right</span>
</div>
<div class="w-0.5 h-2 bg-white"></div>
</div>
<!-- Delete Badge -->
<div class="absolute -bottom-8 left-1/2 -translate-x-1/2">
<div class="w-6 h-6 bg-surface-container-highest rounded-full flex items-center justify-center border border-outline-variant">
<span class="material-symbols-outlined text-white text-[14px]">close</span>
</div>
</div>
</div>
</div>
</main>
<!-- Editing Panel (Bottom 55%) -->
<section class="flex-grow bg-[#0d0d0d] rounded-t-[24px] px-container-padding pt-6 pb-4 overflow-y-auto no-scrollbar flex flex-col gap-6">
<!-- Text Input Field -->
<div class="relative w-full">
<div class="bg-[#1a1a1a] rounded-xl px-4 py-3 flex items-center">
<span class="text-white font-body-lg">Your text here</span>
<div class="w-[2px] h-6 bg-white ml-0.5 cursor-blink"></div>
</div>
</div>
<!-- Style Row Icons -->
<div class="flex justify-between items-center px-2">
<span class="material-symbols-outlined text-white hover:opacity-70 transition-opacity">format_bold</span>
<span class="material-symbols-outlined text-[#555] hover:opacity-70 transition-opacity">format_italic</span>
<span class="material-symbols-outlined text-[#555] hover:opacity-70 transition-opacity">format_underlined</span>
<span class="material-symbols-outlined text-[#555] hover:opacity-70 transition-opacity">format_strikethrough</span>
<div class="h-6 w-px bg-outline-variant mx-1"></div>
<span class="material-symbols-outlined text-[#555] hover:opacity-70 transition-opacity">format_align_left</span>
<span class="material-symbols-outlined text-white hover:opacity-70 transition-opacity">format_align_center</span>
<span class="material-symbols-outlined text-[#555] hover:opacity-70 transition-opacity">format_align_right</span>
</div>
<!-- Font Selector -->
<div class="flex flex-col gap-3">
<div class="flex overflow-x-auto no-scrollbar gap-2 py-1">
<button class="flex-shrink-0 px-5 py-2 bg-white text-black rounded-full font-label-md">Default</button>
<button class="flex-shrink-0 px-5 py-2 bg-[#1a1a1a] text-white border border-[#333] rounded-full font-label-md font-bold">Bold</button>
<button class="flex-shrink-0 px-5 py-2 bg-[#1a1a1a] text-white border border-[#333] rounded-full font-label-md" style="font-family: 'Pacifico', cursive;">Handwriting</button>
<button class="flex-shrink-0 px-5 py-2 bg-[#1a1a1a] text-white border border-[#333] rounded-full font-label-md" style="font-family: 'Playfair Display', serif;">Serif</button>
<button class="flex-shrink-0 px-5 py-2 bg-[#1a1a1a] text-white border border-[#333] rounded-full font-label-md" style="text-shadow: 0 0 5px #fff;">Neon</button>
<button class="flex-shrink-0 px-5 py-2 bg-[#1a1a1a] text-white border border-[#333] rounded-full font-label-md" style="font-family: 'Courier Prime', monospace;">Typewriter</button>
</div>
</div>
<!-- Color Selection -->
<div class="flex flex-col gap-4">
<div class="flex items-center gap-4 overflow-x-auto no-scrollbar py-1">
<span class="font-label-md text-on-surface-variant flex-shrink-0">Color</span>
<div class="w-8 h-8 rounded-full bg-white ring-2 ring-offset-2 ring-offset-black ring-white"></div>
<div class="w-8 h-8 rounded-full bg-black border border-white"></div>
<div class="w-8 h-8 rounded-full bg-[#ff4081]"></div>
<div class="w-8 h-8 rounded-full bg-[#ffeb3b]"></div>
<div class="w-8 h-8 rounded-full bg-[#4caf50]"></div>
<div class="w-8 h-8 rounded-full bg-[#2196f3]"></div>
<div class="w-8 h-8 rounded-full bg-[#9c27b0]"></div>
<div class="w-8 h-8 rounded-full bg-[#ff5722]"></div>
<div class="w-8 h-8 rounded-full bg-gradient-primary"></div>
</div>
<!-- Background Selection -->
<div class="flex items-center gap-4 overflow-x-auto no-scrollbar py-1">
<span class="font-label-md text-on-surface-variant flex-shrink-0">Background</span>
<div class="w-8 h-8 rounded-full bg-transparent border border-dashed border-outline-variant flex items-center justify-center">
<span class="material-symbols-outlined text-[16px]">block</span>
</div>
<div class="w-8 h-8 rounded-full bg-white"></div>
<div class="w-8 h-8 rounded-full bg-black ring-2 ring-offset-2 ring-offset-black ring-white"></div>
<div class="w-8 h-8 rounded-full bg-[#ff4081]"></div>
<div class="w-8 h-8 rounded-full bg-[#ffeb3b]"></div>
<div class="w-8 h-8 rounded-full bg-[#4caf50]"></div>
<div class="w-8 h-8 rounded-full bg-[#2196f3]"></div>
<div class="w-8 h-8 rounded-full bg-[#9c27b0]"></div>
</div>
</div>
<!-- Animation Button -->
<button class="mt-auto w-full h-[56px] bg-[#1a1a1a] rounded-xl flex items-center justify-between px-6 active:scale-[0.98] transition-transform">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary">animation</span>
<span class="font-label-md text-white">Animation</span>
</div>
<span class="material-symbols-outlined text-outline text-[18px]">arrow_forward_ios</span>
</button>
</section>
<!-- Atmosphere/Micro-interaction Script -->
<script>
        document.querySelectorAll('button, .w-8').forEach(el => {
            el.addEventListener('click', function() {
                this.classList.add('scale-90');
                setTimeout(() => this.classList.remove('scale-90'), 100);
            });
        });
    </script>
</body></html>
