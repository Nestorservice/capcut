<body class="flex flex-col h-screen max-h-screen">

<main class="flex-1 flex flex-col overflow-hidden">

<!-- REC Indicator -->
<div class="absolute top-4 right-4 flex items-center gap-2 bg-black/40 px-3 py-1 rounded-full border border-white/10 glass-panel">
<span class="w-2.5 h-2.5 bg-red-600 rounded-full recording-pulse"></span>
<span class="font-label-md text-label-md text-white tracking-widest">REC</span>
</div>
<!-- Time Overlay -->

<span class="font-label-md text-label-md text-white bg-black/40 px-2 py-1 rounded">00:00:04:12</span>
</div>
</div>
</section>
<!-- WAVEFORM ZONE -->
<section class="h-[18%] w-full bg-[#111111] relative flex items-center justify-center border-y border-white/5 overflow-hidden">
<!-- Timeline Cursor -->
<div class="absolute inset-0 flex justify-center pointer-events-none z-10">
<div class="w-[2px] h-full bg-white shadow-[0_0_8px_rgba(255,255,255,0.5)]"></div>
</div>
<!-- Waveform Animation -->
<div class="flex items-center gap-[2px] h-full w-[200%] px-1/2">
<!-- Generating mock waveform bars -->
<script>
                    const waveformContainer = document.currentScript.parentElement;
                    const colors = ['bg-white/40', 'bg-white/40', 'bg-tertiary', 'bg-white/40'];
                    for(let i=0; i<150; i++) {
                        const bar = document.createElement('div');
                        const height = Math.floor(Math.random() * 60) + 10;
                        const colorClass = colors[Math.floor(Math.random() * colors.length)];
                        bar.className = `waveform-bar w-1 rounded-full ${colorClass}`;
                        bar.style.height = `${height}%`;
                        waveformContainer.appendChild(bar);
                    }

                    // Simple animation for waveform
                    setInterval(() => {
                        const bars = document.querySelectorAll('.waveform-bar');
                        bars.forEach(b => {
                            if (Math.random() > 0.7) {
                                const newHeight = Math.floor(Math.random() * 70) + 5;
                                b.style.height = `${newHeight}%`;
                            }
                        });
                    }, 150);
                </script>
</div>
</section>
<!-- CONTROLS ZONE -->
<section class="flex-1 w-full bg-black flex flex-col justify-between pt-gutter pb-6">
<!-- Timeline Ruler -->
<div class="w-full overflow-hidden mb-2">
<div class="flex items-end h-8 gap-12 px-container-padding opacity-40">
<div class="flex flex-col items-center"><div class="w-px h-2 bg-white"></div><span class="text-[8px] mt-1">00:01</span></div>

<div class="w-0.5 h-full bg-primary-container rounded-full"></div>

<div class="w-0.5 h-full bg-primary-container rounded-full"></div>
</div>
<span class="font-label-md text-label-md text-primary-container">00:04s</span>
<button class="hover:text-white transition-colors">
<span class="material-symbols-outlined text-[16px]">close</span>
</button>
</div>
<!-- Empty space for scroll affordance -->
<div class="w-12 h-1 flex-shrink-0"></div>
</div>
</div>
</section>
</main>
<!-- Bottom Navigation Bar - Hidden on focused tasks as per mandate -->
<!-- Suppressed due to task-focused recording flow -->
<script>
        // Micro-interactions
        const recordBtn = document.querySelector('button.bg-primary-container');
        let isRecording = true;

        recordBtn.addEventListener('click', () => {
            isRecording = !isRecording;
            const innerIcon = recordBtn.querySelector('div');
            const aura = document.querySelector('.aura-pulse');
            const recIndicator = document.querySelector('.recording-pulse').parentElement;

            if (isRecording) {
                innerIcon.className = "w-6 h-6 bg-white rounded-sm"; // Square stop
                aura.classList.add('aura-pulse');
                recIndicator.classList.remove('opacity-0');
            } else {
                innerIcon.className = "w-6 h-6 bg-white rounded-full"; // Circle record
                aura.classList.remove('aura-pulse');
                recIndicator.classList.add('opacity-0');
            }
        });

        // Horizontal scroll animation for waveform
        const waveform = document.querySelector('.flex.items-center.gap-\\[2px\\]');
        let pos = 0;
        function step() {
            if (isRecording) {
                pos -= 0.5;
                if (pos < -500) pos = 0;
                waveform.style.transform = `translateX(${pos}px)`;
            }
            requestAnimationFrame(step);
        }
        requestAnimationFrame(step);
    </script>
</body></html>
