<!-- Subtle Particle Background Effect (Atmospheric) -->
<div class="fixed inset-0 pointer-events-none z-0" id="particle-canvas"></div>
<script>
        // Simple micro-interaction for buttons
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('touchstart', () => {
                button.style.transform = 'scale(0.97)';
            });
            button.addEventListener('touchend', () => {
                button.style.transform = 'scale(1)';
            });
        });

        // Atmospheric micro-interaction: Subtle glow following touch/mouse
        const body = document.querySelector('body');
        const glow = document.createElement('div');
        glow.className = 'fixed w-64 h-64 rounded-full pointer-events-none blur-[120px] opacity-20 transition-opacity duration-500';
        glow.style.background = 'radial-gradient(circle, #ff4081 0%, transparent 70%)';
        glow.style.top = '-1000px';
        body.appendChild(glow);

        window.addEventListener('mousemove', (e) => {
            glow.style.left = `${e.clientX - 128}px`;
            glow.style.top = `${e.clientY - 128}px`;
            glow.style.opacity = '0.15';
        });

        window.addEventListener('touchmove', (e) => {
            const touch = e.touches[0];
            glow.style.left = `${touch.clientX - 128}px`;
            glow.style.top = `${touch.clientY - 128}px`;
            glow.style.opacity = '0.2';
        });
    </script>
