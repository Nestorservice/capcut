<script>
        // Micro-interaction: Update preview text on cell click (Simplified mock)
        document.querySelectorAll('button.group').forEach(btn => {
            btn.addEventListener('click', function() {
                // Clear active borders
                document.querySelectorAll('.aspect-square').forEach(el => {
                    el.classList.remove('border-primary-container', 'shadow-[0_0_15px_rgba(255,76,134,0.3)]');
                    el.classList.add('border-transparent');
                });
                document.querySelectorAll('.font-label-sm').forEach(el => {
                    el.classList.remove('text-primary');
                    el.classList.add('text-on-surface-variant');
                });

                // Set new active
                const inner = this.querySelector('.aspect-square');
                inner.classList.remove('border-transparent');
                inner.classList.add('border-primary-container', 'shadow-[0_0_15px_rgba(255,76,134,0.3)]');
                this.querySelector('.font-label-sm').classList.add('text-primary');
                this.querySelector('.font-label-sm').classList.remove('text-on-surface-variant');

                // Trigger small animation on preview
                const preview = document.getElementById('preview-text');
                preview.style.opacity = '0';
                setTimeout(() => {
                    preview.style.opacity = '0.8';
                }, 200);
            });
        });
    </script>
