<script>
        // Micro-interaction for the confirm button glow
        const confirmBtn = document.querySelector('.bg-gradient-to-r');
        confirmBtn.addEventListener('touchstart', () => {
            confirmBtn.style.boxShadow = '0 0 20px rgba(255, 64, 129, 0.4)';
        });
        confirmBtn.addEventListener('touchend', () => {
            confirmBtn.style.boxShadow = 'none';
        });

        // Simple animation simulation for the trimmer
        let currentPos = 40;
        const cursor = document.querySelector('.bg-white.z-30');
        
        function moveCursor() {
            currentPos += 0.1;
            if (currentPos > 75) currentPos = 15;
            cursor.style.left = `${currentPos}%`;
            requestAnimationFrame(moveCursor);
        }
        // Uncomment to enable live playhead simulation
        // moveCursor();
    </script>
